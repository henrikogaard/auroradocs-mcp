name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    name: Node ${{ matrix.node-version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check package
        run: pnpm check

      - name: Audit production dependencies
        run: npx --yes --package=node@22.13.0 --package=pnpm@11.13.0 pnpm audit --prod

      - name: Create dry-run package manifest
        run: npm pack --dry-run --ignore-scripts --json > package-manifest.json

      - name: Upload dry-run package manifest
        uses: actions/upload-artifact@v7
        with:
          name: package-manifest-node-${{ matrix.node-version }}
          path: package-manifest.json
          if-no-files-found: error

  production-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production-smoke
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run read-only production smoke
        run: pnpm auroracloud-live-smoke
        env:
          AURORA_API_URL: ${{ secrets.AURORA_API_URL }}
          AURORA_WORKSPACE_ID: ${{ secrets.AURORA_WORKSPACE_ID }}
          AURORA_API_TOKEN: ${{ secrets.AURORA_API_TOKEN }}
