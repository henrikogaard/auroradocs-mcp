name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install trusted-publishing npm CLI
        run: npm install --global npm@11.18.0

      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$tag_version" != "$package_version" ]]; then
            echo "::error::Tag version does not match package.json version."
            exit 1
          fi

      - name: Check package
        run: pnpm check

      - name: Publish package with trusted publishing
        run: npm publish --provenance --access public

      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}
